<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        header {
            background: #6a11cb;
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .content {
            padding: 25px;
        }
        
        p {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .button {
            display: block;
            width: 100%;
            background: #6a11cb;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 20px 0;
            text-align: center;
            text-decoration: none;
            transition: background 0.3s;
        }
        
        .button:hover {
            background: #2575fc;
        }
        
        .welcome-message {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        .welcome-message h2 {
            color: #6a11cb;
            margin-bottom: 10px;
        }
        
        .offline-status {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            display: none;
        }
        
        .offline-status.offline {
            color: #ff4444;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 14px;
        }
        
        @media (max-width: 480px) {
            header {
                padding: 20px;
            }
            
            h1 {
                font-size: 20px;
            }
            
            .content {
                padding: 20px;
            }
            
            .button {
                padding: 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome to My App</h1>
            <p>Your PWA is ready</p>
        </header>
        
        <div class="content">
            <div class="welcome-message">
                <h2>Hello!</h2>
                <p>Welcome to the application. This is your start page where you can begin using the app.</p>
                <div class="offline-status" id="offlineStatus"></div>
            </div>
            
            <button class="button" id="getStartedBtn">Get Started</button>
            
            <p style="text-align: center; color: #666; font-size: 14px;">
                Version 1.0.0
            </p>
        </div>
        
        <footer>
            <p>&copy; 2024 My App. All rights reserved.</p>
        </footer>
    </div>

    <script>
        // Service Worker Registration for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js', { scope: '/' })
                    .then(registration => {
                        console.log('✅ Service Worker registered successfully with scope:', registration.scope);
                        
                        // Check for updates to the service worker
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            console.log('🔄 New service worker update found');
                            
                            newWorker.addEventListener('statechange', () => {
                                console.log('📦 Service worker state:', newWorker.state);
                            });
                        });
                    })
                    .catch(error => {
                        console.log('❌ Service Worker registration failed:', error);
                        
                        // Display offline status message
                        const offlineStatus = document.getElementById('offlineStatus');
                        offlineStatus.textContent = '⚠️ Running in online mode only';
                        offlineStatus.style.display = 'block';
                    });
            });
            
            // Check if app is running in standalone mode (installed)
            if (window.matchMedia('(display-mode: standalone)').matches) {
                console.log('📱 App is running in installed PWA mode');
            } else {
                console.log('🌐 App is running in browser mode');
            }
            
            // Monitor online/offline status
            function updateOnlineStatus() {
                const offlineStatus = document.getElementById('offlineStatus');
                if (!navigator.onLine) {
                    offlineStatus.textContent = '📴 You are currently offline - using cached content';
                    offlineStatus.classList.add('offline');
                    offlineStatus.style.display = 'block';
                } else {
                    offlineStatus.textContent = '';
                    offlineStatus.classList.remove('offline');
                    offlineStatus.style.display = 'none';
                }
            }
            
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
            
        } else {
            console.log('❌ Service Workers are not supported in this browser');
            const offlineStatus = document.getElementById('offlineStatus');
            offlineStatus.textContent = '⚠️ Your browser does not support offline features';
            offlineStatus.style.display = 'block';
        }

        // Get Started button functionality
        document.getElementById('getStartedBtn').addEventListener('click', function() {
            alert('Welcome to the app! This is your start page.');
            // You can add navigation or other functionality here
        });

        // Optional: Add to homescreen detection for iOS
        let isIos = navigator.userAgent.includes('iPhone') || navigator.userAgent.includes('iPad');
        let isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        
        if (isIos && !isStandalone) {
            console.log('🍎 iOS user - can add to home screen');
        }
    </script>
</body>
</html>
